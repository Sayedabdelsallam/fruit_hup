name: fruit_hub
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: ^3.5.4
dependencies:
  flutter_localizations:
    sdk: flutter
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17
  flutter_easyloading: ^3.0.5
  bot_toast: ^4.1.3
  lottie: ^3.2.0
  intl_utils: ^2.8.10
  dots_indicator: ^4.0.1
  flutter_screenutil: ^5.9.3
  shared_preferences: ^2.5.2
  firebase_core: ^3.12.1
  dartz: ^0.10.1
  firebase_auth: ^5.5.1
  flutter_bloc: ^9.1.0
  get_it: ^8.0.3
  modal_progress_hud_nsn: ^0.5.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/icons/Checkbox.svg
    - assets/images/
  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600

flutter_intl:
  enabled: true
